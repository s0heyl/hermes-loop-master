name: Quality

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate skill
        run: python scripts/validate_skill.py SKILL.md
      - name: Validate standard fixture
        run: python scripts/harness_check.py --strict --mode standard examples/good-loop
      - name: Validate critical fixture
        run: python scripts/harness_check.py --strict --mode critical examples/critical-loop
      - name: Confirm bad fixture is rejected
        run: "! python scripts/harness_check.py --strict examples/bad-loop"
      - name: Installer dry run
        run: bash install.sh --dry-run
